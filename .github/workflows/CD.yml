name: Azure Deployment CD

# 🎛️ Explicitly manual: Only triggers when a human clicks "Run workflow" in GitHub UI
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Production Bundle
      run: dotnet publish -c Release -o ./publish

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v3
      with:
        # 💡 Points directly to your live app service name
        app-name: 'employee-api-gecva6cmembvb0dg' 
        # 🔑 Authenticates using the secret we generated in Step 1
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish